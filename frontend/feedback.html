<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback - Event Feedback Management System</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== NAVIGATION BAR ===== -->
  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">Event<span>Feedback</span></a>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="events.html">Events</a></li>
          <li><a href="feedback.html" class="active">Feedback</a></li>
          <li><a href="feedback-list.html">Submitted Feedback</a></li>
        </ul>
      </nav>
      <button class="hamburger" id="hamburger">&#9776;</button>
    </div>
  </header>

  <!-- ===== PAGE HEADER ===== -->
  <section class="page-header">
    <h1>Share Your Feedback</h1>
    <p>Your feedback helps us organize better events in the future.</p>
  </section>

  <!-- ===== FEEDBACK FORM ===== -->
  <section class="form-section">
    <form id="feedbackForm" class="feedback-form" novalidate>

      <!-- Success / Error message box (hidden by default) -->
      <div id="formMessage" class="form-message"></div>

      <div class="form-group">
        <label for="name">Full Name <span class="required">*</span></label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required />
        <small class="error-text" id="nameError"></small>
      </div>

      <div class="form-group">
        <label for="email">Email <span class="required">*</span></label>
        <input type="email" id="email" name="email" placeholder="Enter your email address" required />
        <small class="error-text" id="emailError"></small>
      </div>

      <div class="form-group">
        <label for="event">Event Name <span class="required">*</span></label>
        <select id="event" name="event" required>
          <option value="">-- Select an Event --</option>
          <option value="Tech Conference">Tech Conference</option>
          <option value="Web Development Workshop">Web Development Workshop</option>
          <option value="AI Seminar">AI Seminar</option>
          <option value="Hackathon">Hackathon</option>
          <option value="Cultural Fest">Cultural Fest</option>
          <option value="Music Concert">Music Concert</option>
        </select>
        <small class="error-text" id="eventError"></small>
      </div>

      <div class="form-group">
        <label for="rating">Rating <span class="required">*</span></label>
        <select id="rating" name="rating" required>
          <option value="">-- Select Rating --</option>
          <option value="5">⭐⭐⭐⭐⭐ (5 - Excellent)</option>
          <option value="4">⭐⭐⭐⭐ (4 - Good)</option>
          <option value="3">⭐⭐⭐ (3 - Average)</option>
          <option value="2">⭐⭐ (2 - Poor)</option>
          <option value="1">⭐ (1 - Very Poor)</option>
        </select>
        <small class="error-text" id="ratingError"></small>
      </div>

      <div class="form-group">
        <label for="message">Feedback Message <span class="required">*</span></label>
        <textarea id="message" name="message" rows="5" placeholder="Write your feedback here..." required></textarea>
        <small class="error-text" id="messageError"></small>
      </div>

      <button type="submit" class="btn btn-primary submit-btn">Submit Feedback</button>
    </form>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <p>&copy; 2026 Event Feedback Management System. All rights reserved.</p>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/feedback.js"></script>
</body>
</html>
